# Local / dev compose: assumes Postgres runs on the host machine.
# For self-contained Postgres + migrations, use docker-compose.prod.yml.
#
# Required env (.env at repo root):
#   POSTGRES_PASSWORD, JWT_SECRET, JWT_REFRESH, REDIS_PASSWORD, API_URL
#   Optional: ZK_IP, ZK_PORT
services:
  redis:
    image: redis:7-alpine
    container_name: hr-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    networks: [hr-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hr-backend:local
    container_name: hr-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:changeme@host.docker.internal:5432/hr?sslmode=disable}
      PORT: 3041
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH: ${JWT_REFRESH}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ZK_IP: ${ZK_IP:-192.128.69.33}
      ZK_PORT: ${ZK_PORT:-4370}
      TZ: Asia/Jakarta
    ports:
      - "3041:3041"
    volumes:
      - backend-uploads:/app/public/uploads
    networks: [hr-net]
    extra_hosts:
      # Lets the container reach the host (Postgres, ZKTeco device on host LAN) on Linux too.
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3041/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL_PRODUCTION: ${API_URL}
    image: hr-frontend:local
    container_name: hr-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET}
      TZ: Asia/Jakarta
    ports:
      - "3040:3000"
    networks: [hr-net]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  hr-net:
    driver: bridge

volumes:
  backend-uploads:
