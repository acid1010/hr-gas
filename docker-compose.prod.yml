# Production compose: self-contained Postgres + Redis + migration runner.
# No host ports exposed for Postgres/Redis — they live on the internal network only.
#
# Boot:
#   cp .env.example .env && edit .env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# The `migrate` service runs every SQL file under backend/prisma/migrations/*/migration.sql
# in lexical order, then exits. Files use CREATE ... IF NOT EXISTS so re-runs are safe.
services:
  postgres:
    image: postgres:15-alpine
    container_name: hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: hr
      TZ: Asia/Jakarta
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [hr-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: hr-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    networks: [hr-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  # One-shot migration runner. Applies every migration.sql in lexical order, then exits.
  # Migrations must be idempotent (CREATE TABLE IF NOT EXISTS, etc.) — already the convention here.
  migrate:
    image: postgres:15-alpine
    container_name: hr-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGHOST: postgres
      PGUSER: postgres
      PGDATABASE: hr
    volumes:
      - ./backend/prisma/migrations:/migrations:ro
    networks: [hr-net]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        echo "[migrate] applying migrations from /migrations ..."
        for f in $$(ls -1 /migrations/*/migration.sql 2>/dev/null | sort); do
          echo "[migrate] -> $$f"
          psql -v ON_ERROR_STOP=1 -f "$$f"
        done
        echo "[migrate] done."
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hr-backend:prod
    container_name: hr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hr?sslmode=disable
      PORT: 3041
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH: ${JWT_REFRESH}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ZK_IP: ${ZK_IP:-192.128.69.33}
      ZK_PORT: ${ZK_PORT:-4370}
      TZ: Asia/Jakarta
    ports:
      - "3041:3041"
    volumes:
      - backend-uploads:/app/public/uploads
    networks: [hr-net]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3041/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL_PRODUCTION: ${API_URL}
    image: hr-frontend:prod
    container_name: hr-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TZ: Asia/Jakarta
    ports:
      - "3040:3000"
    networks: [hr-net]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  hr-net:
    driver: bridge

volumes:
  pgdata:
  backend-uploads:
